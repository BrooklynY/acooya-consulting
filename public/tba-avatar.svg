<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB"/>
      <stop offset="100%" style="stop-color:#D1D5DB"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF"/>
      <stop offset="100%" style="stop-color:#6B7280"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- User Silhouette -->
  <circle cx="200" cy="160" r="70" fill="url(#icon)"/>
  <ellipse cx="200" cy="320" rx="110" ry="90" fill="url(#icon)"/>
  <!-- Question Mark -->
  <text x="200" y="225" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#4B5563" text-anchor="middle">?</text>
</svg>